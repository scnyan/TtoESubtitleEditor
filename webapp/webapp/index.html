<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brawl Subtitle Studio Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Brawl Subtitle Studio</h1>
        <p>List, edit, preview, and export subtitle-only MP4 assets.</p>
      </div>
      <nav>
        <button class="tab active" data-page="listPage">List</button>
        <button class="tab" data-page="editorPage">Editor</button>
        <a class="button" href="/original_subtitles.csv">Original CSV</a>
        <a class="button" href="/subtitles_data.csv">JP CSV</a>
        <a class="button" href="/subtitles_data_excel.csv">Excel CSV</a>
        <a class="button" href="/speaker_review_report.csv">Speaker Review CSV</a>
      </nav>
    </header>

    <main>
      <section id="listPage" class="page active">
        <section class="filters">
          <input id="searchInput" placeholder="Search original / Japanese / topic / speaker" />
          <select id="topicFilter"></select>
          <select id="speakerFilter"></select>
          <input id="startFilter" placeholder="Start 0:00:00" />
          <input id="endFilter" placeholder="End 2:40:18" />
          <label class="compact-check"><input id="reviewOnly" type="checkbox" /> Review</label>
          <label class="compact-check"><input id="qualityOnly" type="checkbox" /> 品質要確認</label>
          <button id="clearFilters">Reset</button>
        </section>
        <section class="list-editor-bar">
          <select id="bulkSpeaker">
            <option value="Dani">Dani</option>
            <option value="Quinn">Quinn</option>
            <option value="Adrian">Adrian</option>
            <option value="Gonzalo">Gonzalo</option>
            <option value="Adam">Adam</option>
            <option value="Group">Group</option>
            <option value="SFX">SFX</option>
          </select>
          <button id="setSelectedSpeaker" type="button">選択行の話者を変更</button>
          <button id="setFilteredSpeaker" type="button">絞り込み中の話者を一括変更</button>
          <button id="insertAfterRow" type="button">下に追加</button>
          <button id="duplicateRow" type="button">複製</button>
          <button id="splitRow" type="button">分割</button>
          <button id="mergeNextRow" type="button">次と結合</button>
          <button id="deleteRow" type="button">削除</button>
          <button id="markReviewed" type="button">確認済みにする</button>
        </section>
        <div class="list-layout">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>時間</th>
                  <th>話者</th>
                  <th>確認</th>
                  <th>品質</th>
                  <th>話題</th>
                  <th>日本語</th>
                  <th>原文</th>
                </tr>
              </thead>
              <tbody id="subtitleRows"></tbody>
            </table>
          </div>
          <aside class="detail-panel">
            <div class="muted" id="rowCount">Loading...</div>
            <h2 id="detailTime">字幕を選択</h2>
            <div id="detailTopic"></div>
            <h3>日本語</h3>
            <p id="detailJa"></p>
            <h3>原文</h3>
            <p id="detailEn"></p>
            <button id="editSelectedFromList" type="button">この字幕を編集</button>
          </aside>
        </div>
      </section>

      <section id="editorPage" class="page">
        <div class="editor-grid">
          <section class="preview-column">
            <div class="video-shell">
              <video id="video" controls preload="metadata" src="/video"></video>
              <div id="videoSubtitleOverlay" class="video-subtitle-overlay">
                <div id="videoSubtitleJa" class="video-subtitle-ja"></div>
                <div id="videoSubtitleEn" class="video-subtitle-en"></div>
              </div>
            </div>
            <div class="transport">
              <button id="prevBtn">前の字幕</button>
              <button id="nextBtn">次の字幕</button>
              <button id="jumpBtn">動画を字幕位置へ</button>
              <button id="youtubeBtn">YouTubeプレビュー</button>
            </div>
            <div id="youtubeWrap" class="youtube-wrap hidden">
              <iframe
                id="youtubeFrame"
                title="YouTube preview"
                src="https://www.youtube.com/embed/jTAL9Y6_r48"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
              ></iframe>
            </div>
            <section id="assetPreview" class="asset-preview long">
              <div id="previewJa" class="preview-ja"></div>
              <div id="previewEn" class="preview-en"></div>
            </section>
          </section>

          <aside class="settings-panel">
            <div class="selected-meta" id="selectedMeta">No subtitle selected</div>
            <section class="control-card">
              <h2>表示設定</h2>
              <label>動画サイズ
                <select id="formatSelect">
                  <option value="long">YouTubeロング 16:9</option>
                  <option value="short">YouTubeショート 9:16</option>
                </select>
              </label>
              <label>話者表示
                <select id="speakerMode">
                  <option value="name">名前を表示</option>
                  <option value="color">色だけで区別</option>
                  <option value="none">表示しない</option>
                </select>
              </label>
              <label>文字サイズ <span id="fontSizeValue">40</span>
                <input id="fontSize" type="range" min="22" max="86" value="40" />
              </label>
              <label>字幕の横幅 <span id="textWidthValue">92%</span>
                <input id="textWidth" type="range" min="35" max="100" value="92" />
              </label>
              <label class="check-row">
                <input id="shortsClauseMode" type="checkbox" checked />
                shorts用の見やすい分割を使う
              </label>
              <label class="check-row">
                <input id="popAnimation" type="checkbox" checked />
                ポップ拡大アニメーション
              </label>
              <div class="position-grid">
                <label>上部プレビュー X <span id="overlayXValue">50%</span>
                  <input id="overlayX" type="range" min="5" max="95" value="50" />
                </label>
                <label>上部プレビュー下位置 <span id="overlayBottomValue">7%</span>
                  <input id="overlayBottom" type="range" min="0" max="45" value="7" />
                </label>
                <label>上部プレビュー幅 <span id="overlayWidthValue">92%</span>
                  <input id="overlayWidth" type="range" min="35" max="100" value="92" />
                </label>
                <label>日英の間隔 <span id="overlayGapValue">10px</span>
                  <input id="overlayGap" type="range" min="0" max="44" value="10" />
                </label>
                <label>日本語倍率 <span id="videoJaScaleValue">100%</span>
                  <input id="videoJaScale" type="range" min="50" max="160" value="100" />
                </label>
                <label>英語倍率 <span id="videoEnScaleValue">72%</span>
                  <input id="videoEnScale" type="range" min="40" max="140" value="72" />
                </label>
              </div>
              <div class="color-grid">
                <label>JP color <input id="jpColor" type="color" value="#ffffff" /></label>
                <label>EN color <input id="enColor" type="color" value="#ffffff" /></label>
                <label>BG color <input id="bgColor" type="color" value="#f8fafc" /></label>
                <label>Outline <input id="outlineColor" type="color" value="#050505" /></label>
                <label>Shadow <input id="shadowColor" type="color" value="#000000" /></label>
              </div>
              <label>Outline size <span id="outlineSizeValue">4px</span>
                <input id="outlineSize" type="range" min="0" max="16" value="4" />
              </label>
              <label>Shadow X <span id="shadowXValue">2px</span>
                <input id="shadowX" type="range" min="-12" max="18" value="2" />
              </label>
              <label>Shadow Y <span id="shadowYValue">4px</span>
                <input id="shadowY" type="range" min="0" max="24" value="4" />
              </label>
              <label>Shadow opacity <span id="shadowOpacityValue">100%</span>
                <input id="shadowOpacity" type="range" min="0" max="100" value="100" />
              </label>
              <button id="brawlStylePreset" type="button">ブロスタ風プリセット</button>
            </section>

            <section class="control-card">
              <h2>字幕編集</h2>
              <label>話者
                <input id="speakerEdit" list="speakerOptions" />
              <datalist id="speakerOptions">
                <option value="Dani"></option>
                <option value="Quinn"></option>
                <option value="Adrian"></option>
                <option value="Gonzalo"></option>
                <option value="Adam"></option>
                <option value="Group"></option>
                <option value="SFX"></option>
              </datalist>
              </label>
              <div class="time-grid">
                <label>開始
                  <input id="startEdit" />
                </label>
                <label>終了
                  <input id="endEdit" />
                </label>
              </div>
              <label>話題
                <input id="topicEdit" />
              </label>
              <label>日本語字幕
                <textarea id="jpEdit" rows="7"></textarea>
              </label>
              <div class="clause-panel">
                <div class="clause-head">
                  <strong>shorts用分割</strong>
                  <span id="clauseSummary">0分割</span>
                </div>
                <div id="clauseList" class="clause-list"></div>
              </div>
              <div class="inline-tools">
                <input id="inlineColor" type="color" value="#ffdd2d" />
                <button id="applyInlineColor" type="button">選択文字に色を付ける</button>
                <button id="clearInlineColor" type="button">色指定を消す</button>
              </div>
              <label>原文字幕
                <textarea id="enEdit" rows="6"></textarea>
              </label>
              <div class="button-row">
                <button id="applyEdit">即時反映</button>
                <button id="saveData">JSON/CSVに保存</button>
              </div>
            </section>

            <section class="control-card">
              <h2>字幕素材MP4を書き出し</h2>
              <label>開始 <input id="exportStart" value="0:00:00" /></label>
              <label>終了 <input id="exportEnd" value="2:40:18" /></label>
              <button id="exportBtn">MP4を書き出す</button>
              <div id="exportStatus" class="muted"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
